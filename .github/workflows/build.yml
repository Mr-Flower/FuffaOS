name: bluebuild
on:
  schedule:
    - cron: "15 14 * * *" # build alle 06:00 UTC ogni giorno
  push:
    paths-ignore:
      - "**.md"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  bluebuild:
    name: Build Custom Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        recipe:
          - recipes/recipe.yml # MODIFICATO: aggiunto il percorso della cartella recipes
    steps:
      - name: Build Custom Image
        uses: blue-build/github-action@v1.11
        with:
          recipe: ${{ matrix.recipe }}
          cosign_private_key: ${{ secrets.COSIGN_PRIVATE_KEY }} # Assicurati che il nome del secret sia questo
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
          maximize_build_space: true

      - name: Build ISO # ORA È ALLINEATO CORRETTAMENTE
        uses: jasonn3/build-container-installer@main
        id: build
        with:
          arch: x86_64
          image_name: fuffaos
          image_repo: ghcr.io/${{ github.repository_owner }}
          image_tag: latest
          version: 41
          variant: Bazzite
          iso_name: fuffaos-latest.iso

      - name: Upload ISO as artifact # ORA È ALLINEATO CORRETTAMENTE
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: fuffaos-iso
          path: |
            ${{ steps.build.outputs.iso_path }}/${{ steps.build.outputs.iso_name }}
            ${{ steps.build.outputs.iso_path }}/${{ steps.build.outputs.iso_name }}-CHECKSUM
          if-no-files-found: error
          retention-days: 5
          compression-level: 0