name: bluebuild
on:
  schedule:
    - cron: "00 06 * * *" # Build alle 15:15 ora italiana (UTC 14:15)
  push:
    paths-ignore:
      - "**.md"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  bluebuild:
    name: Build Custom Image
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Necessario per creare la Release
      packages: write    # Necessario per caricare l'immagine su GHCR
      id-token: write    # Necessario per la firma Cosign
    strategy:
      fail-fast: false
      matrix:
        recipe:
          - recipe.yml # Cerca automaticamente in recipes/recipe.yml
    steps:
      # 1. Pulizia Docker per evitare errori di autenticazione "unauthorized"
      - name: Clean Docker config
        run: rm -f ~/.docker/config.json

      # 2. Checkout della repository
      - name: Checkout repo
        uses: actions/checkout@v4

      # 3. Build dell'immagine di sistema (FuffaOS)
      - name: Build Custom Image
        uses: blue-build/github-action@v1.11
        with:
          recipe: ${{ matrix.recipe }}
          cosign_private_key: ${{ secrets.COSIGN_PRIVATE_KEY }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
          maximize_build_space: true

      # 4. Generazione della ISO (fuffaos-latest.iso)
      - name: Build ISO
        uses: jasonn3/build-container-installer@main
        id: build
        with:
          arch: x86_64
          image_name: fuffaos
          image_repo: ghcr.io/mr-flower
          image_tag: latest
          version: 41
          variant: Bazzite
          iso_name: fuffaos-latest.iso

      # 5. Caricamento della ISO come Artifact (backup temporaneo)
      - name: Upload ISO as artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: fuffaos-iso
          path: |
            ${{ steps.build.outputs.iso_path }}/${{ steps.build.outputs.iso_name }}
            ${{ steps.build.outputs.iso_path }}/${{ steps.build.outputs.iso_name }}-CHECKSUM
          if-no-files-found: error
          retention-days: 2
          compression-level: 0

      # 6. Pubblicazione della ISO nella sezione Releases di GitHub
      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          tag_name: v${{ github.run_number }}
          name: FuffaOS Build ${{ github.run_number }}
          body: |
            Immagine ISO ufficiale di **FuffaOS** (ThinkPad Ryzen Edition).
            Basata su Fedora 41 / Bazzite.
            
            **Cosa include:**
            - Google Chrome (Flatpak)
            - Driver Fingerprint per ThinkPad
            - Tool di sviluppo (GCC, CMake, Make)
            - Branding personalizzato Flower
          files: |
            ${{ steps.build.outputs.iso_path }}/${{ steps.build.outputs.iso_name }}
            ${{ steps.build.outputs.iso_path }}/${{ steps.build.outputs.iso_name }}-CHECKSUM
        env:
          GITHUB_TOKEN: ${{ github.token }}