name: bluebuild
on:
  schedule:
    - cron: "00 06 * * *"
  push:
    paths-ignore:
      - "**.md"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  bluebuild:
    name: Build Custom Image
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        recipe:
          - recipe.yml
    steps:
      - name: Clean Docker config
        run: rm -f ~/.docker/config.json

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build Custom Image
        uses: blue-build/github-action@v1.11
        with:
          recipe: ${{ matrix.recipe }}
          cosign_private_key: ${{ secrets.COSIGN_PRIVATE_KEY }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
          maximize_build_space: true

      - name: Build ISO
        uses: jasonn3/build-container-installer@main
        id: build
        with:
          arch: x86_64
          image_name: fuffaos
          image_repo: ghcr.io/mr-flower
          image_tag: latest
          version: 41
          variant: Bazzite
          iso_name: fuffaos-latest.iso

      - name: Upload ISO as artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: fuffaos-iso
          path: |
            ${{ steps.build.outputs.iso_path }}/${{ steps.build.outputs.iso_name }}
            ${{ steps.build.outputs.iso_path }}/${{ steps.build.outputs.iso_name }}-CHECKSUM
          if-no-files-found: error
          retention-days: 2
          compression-level: 0

      
      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          ISO_NAME: ${{ steps.build.outputs.iso_name }}
          ISO_PATH: ${{ steps.build.outputs.iso_path }}
        run: |
          TAG="v${{ github.run_number }}"
          gh release create "$TAG" \
            --title "FuffaOS Build ${{ github.run_number }}" \
            --notes "ISO ufficiale di FuffaOS (ThinkPad Ryzen Edition). Basata su Fedora 41." \
            "$ISO_PATH/$ISO_NAME" \
            "$ISO_PATH/$ISO_NAME-CHECKSUM"